name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true
      
      - name: Run Prettier check
        id: prettier
        run: npx prettier --check .
        continue-on-error: true
      
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintResult = "${{ steps.eslint.outcome }}";
            const prettierResult = "${{ steps.prettier.outcome }}";
            const report = `## Code Quality Report
            - **ESLint**: ${eslintResult === 'success' ? 'Passed' : 'Failed'}
            - **Prettier**: ${prettierResult === 'success' ? 'Passed' : 'Failed'}
            
            For detailed logs, check the "code-quality" job run.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests with coverage
        id: tests
        run: npm test -- --coverage
        continue-on-error: true
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: coverage/
          if-no-files-found: warn
      
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = "${{ steps.tests.outcome }}";
            const report = `## Test Coverage Report
            - **Test Suite**: ${testResult === 'success' ? 'Passed' : 'Failed'}
            - **Coverage Summary**: Check the uploaded "test-coverage" artifact for detailed coverage data.
            
            For detailed logs, check the "testing-suite" job run.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run dependency vulnerability check (npm audit)
        id: npm-audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Scan for secrets (Gitleaks)
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --path=. --no-git
        continue-on-error: true
      
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const auditResult = "${{ steps.npm-audit.outcome }}";
            const secretsResult = "${{ steps.gitleaks.outcome }}";
            const report = `## Security Scan Report
            - **Dependencies (npm audit)**: ${auditResult === 'success' ? 'No moderate/critical vulnerabilities found' : 'Vulnerabilities detected'}
            - **Secrets Scan (Gitleaks)**: ${secretsResult === 'success' ? 'No secrets found' : 'Potential secrets detected'}
            
            For detailed logs, check the "security-scan" job run.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        id: build
        run: npm run build
        continue-on-error: true
      
      - name: Validate endpoints
        id: endpoint-check
        run: |
          npm start &
          sleep 5
          curl -f http://localhost:3000/health || exit 1
        continue-on-error: true
        if: steps.build.outcome == 'success'
      
      - name: Upload build preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-preview
          path: dist/
          if-no-files-found: warn
        if: steps.build.outcome == 'success'
      
      - name: Post Build Validation Report
        uses: actions/github-script@v7
        with:
          script: |
            const buildResult = "${{ steps.build.outcome }}";
            const endpointResult = "${{ steps.endpoint-check.outcome || 'skipped' }}";
            const report = `## Build Validation
            - **Application Build**: ${buildResult === 'success' ? 'Passed' : 'Failed'}
            - **Endpoint Validation**: ${endpointResult === 'success' ? 'Passed' : endpointResult === 'skipped' ? 'Skipped (build failed)' : 'Failed'}
            - **Build Preview**: ${buildResult === 'success' ? 'Check the uploaded "build-preview" artifact' : 'Not available (build failed)'}
            
            For detailed logs, check the "build-validation" job run.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
